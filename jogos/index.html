<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Jogos</title>
    <link rel="shortcut icon" href="https://i.ibb.co/d0HBZsbV/image-default.png" type="image/x-icon">
    <link rel="stylesheet" href="https://flourishing-rolypoly-9e1d90.netlify.app/projeto-base/style.css">
    <style>
        @media screen and (max-width: 1024px) {
            .conteudo__grupo {
                flex-wrap: wrap;
            }

            .conteudo__camada:nth-child(1),
            .conteudo__camada:nth-child(2) {
                border-bottom: 4px solid #2e2e2e;
                padding: 1rem 0;
            }
        }
    </style>
</head>
<body>
    <main class="conteudo modelo__horizontal modelo__centralizado">
        <section class="conteudo__secao modelo__vertical modelo__centralizado">
            <h1 class="conteudo__titulo">Jogos</h1>
            <p class="conteudo__texto" id="elemento-contador">Quantidade de jogos alugados: 0</p>

            <div class="conteudo__grupo modelo__horizontal modelo__centralizado">
                <div class="conteudo__camada modelo__vertical" id="jogo-1">
                    <img src="https://i.ibb.co/d0HBZsbV/image-default.png" alt="Imagem padrão" class="conteudo__imagem"/>
                    <h3 class="conteudo__subtitulo-2">Jogo 01</h3>
                    <button onclick="alugar(1)" id="botao-alugar" class="conteudo__botao conteudo__botao--azul">
                        Alugar
                    </button>
                </div>
                <div class="conteudo__camada modelo__vertical" id="jogo-2">
                    <img src="https://i.ibb.co/d0HBZsbV/image-default.png" alt="Imagem padrão" class="conteudo__imagem"/>
                    <h3 class="conteudo__subtitulo-2">Jogo 02</h3>
                    <button onclick="alugar(2)" id="botao-alugar" class="conteudo__botao conteudo__botao--azul">
                        Alugar
                    </button>
                </div>
                <div class="conteudo__camada modelo__vertical" id="jogo-3">
                    <img src="https://i.ibb.co/d0HBZsbV/image-default.png" alt="Imagem padrão" class="conteudo__imagem"/>
                    <h3 class="conteudo__subtitulo-2">Jogo 03</h3>
                    <button onclick="alugar(3)" id="botao-alugar" class="conteudo__botao conteudo__botao--azul">
                        Alugar
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
