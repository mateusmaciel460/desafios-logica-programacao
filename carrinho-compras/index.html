<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de compras</title>
    <link rel="shortcut icon" href="https://i.ibb.co/d0HBZsbV/image-default.png" type="image/x-icon">
    <link rel="stylesheet" href="https://flourishing-rolypoly-9e1d90.netlify.app/projeto-base/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="conteudo modelo__horizontal modelo__centralizado">
        <section class="conteudo__secao modelo__vertical modelo__centralizado">
            <h1 class="conteudo__titulo">Carrinho de compras</h1>

            <div class="conteudo__grupo modelo__vertical">
                <div class="conteudo__camada">
                    <input type="number" id="quantidade" name="quantidade" placeholder="Quantidade" class="conteudo__caixa-texto"/>
                </div>
                <div class="conteudo__camada">
                    <select id="produto" name="produto" class="conteudo__caixa-texto">z</select>
                </div>
            </div>

            <div class="conteudo__botoes modelo__horizontal modelo__centralizado">
                <button onclick="adicionar()" id="botao-adicionar" class="conteudo__botao conteudo__botao--azul">Adicionar</button>
            </div>  

            <div class="conteudo__mensagem modelo__vertical modelo__centralizado" id="elemento-mensagem-erro"></div>
        </section>

        <section class="conteudo__secao modelo__vertical">
            <h2 class="conteudo__subtitulo">
                Total: R$<span class="conteudo__destaque" id="elemento-preco-geral">0</span>
            </h2>

            <div class="conteudo__grupo modelo__vertical">
                <div class="conteudo__camada modelo__horizontal modelo__centralizado" id="elemento-lista-produtos"></div>
            </div>
            <hr/>
            <div class="conteudo__grupo modelo__vertical">
                <div class="conteudo camada">
                    <ul class="conteudo__menu modelo__horizontal modelo__centralizado" id="elemento-produtos-adicionados"></ul>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
